id: respiratory.red_flags
version: 0.1.0
status: research_only
rules:
  - id: respiratory.severe_breathing_difficulty
    when:
      fact: symptom.dyspnea
      equals: severe
    safety_level: emergency
  - id: respiratory.hemoptysis
    when:
      fact: symptom.hemoptysis
      equals: true
    safety_level: urgent
  - id: respiratory.chest_pain_with_dyspnea
    all:
      - fact: symptom.chest_pain
        equals: true
      - fact: symptom.dyspnea
        in:
          - moderate
          - severe
    safety_level: urgent
