openapi: 3.1.0
info:
  title: Clinical Interview Research Knowledge
  version: 0.8.0
  description: Read-only, research-only Knowledge and Fact resources. No patient data is accepted.
servers:
  - url: https://ggojang.github.io/clinical-interview-platform
paths:
  /gpt/manifest.json:
    get:
      operationId: getManifest
      summary: Get the current knowledge manifest and resource digests
      responses:
        '200':
          description: Knowledge manifest
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/reason-for-encounters.json:
    get:
      operationId: getReasonForEncounters
      summary: Get the Reason for Encounter catalog, aliases, and implementation status
      responses:
        '200':
          description: Reason for Encounter catalog
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/common-facts.json:
    get:
      operationId: getCommonInterviewFacts
      summary: Get compact shared Facts including additional-comment handling
      responses:
        '200':
          description: Common interview Fact collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/facts.json:
    get:
      operationId: getReasonForEncounterFacts
      summary: Get compact Facts for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter Fact collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/questions.json:
    get:
      operationId: getReasonForEncounterQuestions
      summary: Get compact questions for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter question collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/rules.json:
    get:
      operationId: getReasonForEncounterRules
      summary: Get compact safety and routing rules for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter rule collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/screening-kr.json:
    get:
      operationId: getScreeningKnowledge
      summary: Get Korean screening knowledge only after preventive care is the Reason for Encounter
      responses:
        '200':
          description: Korean screening knowledge
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/terminology-source.json:
    get:
      operationId: getTerminologySource
      summary: Get STOM source identity, verified operations, cadence, and limitations
      responses:
        '200':
          description: Terminology source manifest
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
components:
  parameters:
    RfeId:
      name: rfeId
      in: path
      required: true
      description: Implemented Reason for Encounter package identifier without the rfe prefix
      schema:
        type: string
        enum: [abdominal_pain, chest_pain, cough, dizziness_syncope, dyspnea, fever, headache]
  schemas:
    JsonDocument:
      type: object
      additionalProperties: true
