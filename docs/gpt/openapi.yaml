openapi: 3.1.0
info:
  title: Clinical Interview Research Knowledge
  version: 1.44.0
  description: Read-only, research-only Knowledge and Fact resources. No patient data is accepted.
servers:
  - url: https://ggojang.github.io/clinical-interview-platform
paths:
  /gpt/manifest.json:
    get:
      operationId: getManifest
      summary: Get the current knowledge manifest and resource digests
      responses:
        '200':
          description: Knowledge manifest
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/reason-for-encounters.json:
    get:
      operationId: getReasonForEncounters
      summary: Get the Reason for Encounter catalog, aliases, and implementation status
      responses:
        '200':
          description: Reason for Encounter catalog
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/common-facts.json:
    get:
      operationId: getCommonInterviewFacts
      summary: Get compact shared Facts including additional-comment handling
      responses:
        '200':
          description: Common interview Fact collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/facts.json:
    get:
      operationId: getReasonForEncounterFacts
      summary: Get compact Facts for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter Fact collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/questions.json:
    get:
      operationId: getReasonForEncounterQuestions
      summary: Get compact questions for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter question collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/rules.json:
    get:
      operationId: getReasonForEncounterRules
      summary: Get compact safety and routing rules for one implemented Reason for Encounter
      parameters:
        - $ref: '#/components/parameters/RfeId'
      responses:
        '200':
          description: Reason for Encounter rule collection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/rfe/{rfeId}/rules/{ruleType}.json:
    get:
      operationId: getReasonForEncounterRulePartition
      summary: Get one declared compact rule partition after loading the RFE rule index
      parameters:
        - $ref: '#/components/parameters/RfeId'
        - $ref: '#/components/parameters/RuleType'
      responses:
        '200':
          description: Reason for Encounter rule partition
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/screening-kr.json:
    get:
      operationId: getScreeningKnowledge
      summary: Get Korean screening knowledge only after preventive care is the Reason for Encounter
      responses:
        '200':
          description: Korean screening knowledge
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/hira-adequacy-assessments.json:
    get:
      operationId: getHiraAdequacyAssessmentInterviews
      summary: Resolve HIRA assessment or fixed-questionnaire entry aliases and get source-aware interview definitions
      responses:
        '200':
          description: Research-only registry separating patient or proxy questions, fixed questionnaires, and clinician observation, test, record, or claim fields
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/assessments/{programId}.json:
    get:
      operationId: getHiraAdequacyAssessmentInterviewProgram
      summary: Prefetch one explicitly selected patient-writable HIRA assessment program before asking its start confirmation; do not display items until confirmed
      parameters:
        - name: programId
          in: path
          required: true
          description: Program identifier returned by the HIRA assessment entry catalog after explicit selection; this read-only prefetch sends no patient data
          schema:
            type: string
            enum: [hira.long_term_care_hospital_inpatient.2026-cycle2-8, hira.depression_outpatient, hira.rheumatoid_arthritis, hira.inpatient_patient_experience.5th-2025, hira.acute_stroke_event_history, hira.medical_aid_psychiatry_patient_experience, hira.mental_health_inpatient_patient_experience, hira.anesthesia_patient_assessment, hira.imaging_pre_examination_assessment, hira.dementia_patient_proxy_assessment]
      responses:
        '200':
          description: One compact research-only program containing its patient or proxy question groups, result-capture items, or fixed-questionnaire reference
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/questionnaires/patient-experience-5th-2025/metadata.json:
    get:
      operationId: getPatientExperienceQuestionnaire
      summary: Load the patient-experience activation gate; ask its required confirmation question before loading any section
      responses:
        '200':
          description: Metadata whose activation_gate requires asking whether the user wants to complete the survey; do not load a section until the user answers affirmatively
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/questionnaires/patient-experience-5th-2025/sections/{sectionId}.json:
    get:
      operationId: getPatientExperienceQuestionnaireSection
      summary: Load one patient-experience Questionnaire section only after affirmative activation confirmation
      parameters:
        - name: sectionId
          in: path
          required: true
          description: Source questionnaire section number
          schema:
            type: integer
            enum: [1, 2, 3, 4, 5, 6, 7, 8]
      responses:
        '200':
          description: One compact Questionnaire section without patient responses; if activation is not confirmed, do not present its items and ask the required activation question
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/terminology-source.json:
    get:
      operationId: getTerminologySource
      summary: Get STOM source identity, verified operations, cadence, and limitations
      responses:
        '200':
          description: Terminology source manifest
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/interoperability/uscdi-v6-core.json:
    get:
      operationId: getUscdiV6CoreOverlay
      summary: Get the research-only USCDI v6 mapping and gap-analysis overlay; it never determines clinical questions
      responses:
        '200':
          description: Versioned USCDI v6 interoperability overlay without patient responses
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/interoperability/uscdi-plus-domain-overlays.json:
    get:
      operationId: getUscdiPlusDomainOverlays
      summary: Get domain-specific Maternal Health, Quality, Behavioral Health and Public Health mapping overlays
      responses:
        '200':
          description: USCDI+ domain overlays with maturity and jurisdiction preserved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/interoperability/uscdi-policy.json:
    get:
      operationId: getUscdiInteroperabilityPolicy
      summary: Get the authority boundary that prevents USCDI gaps from creating clinical questions or safety rules
      responses:
        '200':
          description: USCDI interoperability policy without patient responses
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
  /gpt/interoperability/uscdi-coverage.json:
    get:
      operationId: getUscdiInteroperabilityCoverage
      summary: Get package-by-package USCDI v6 mapping Coverage and applicable USCDI+ domains
      responses:
        '200':
          description: Research-only interoperability gap report without patient responses
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JsonDocument'}
components:
  parameters:
    RfeId:
      name: rfeId
      in: path
      required: true
      description: Implemented Reason for Encounter package identifier without the rfe prefix
      schema:
        type: string
        enum: [abdominal_pain, allergy_concern, anemia_concern_follow_up, asthma_copd_follow_up, back_pain, bowel_symptoms, breast_symptoms, chest_pain, cough, diabetes_follow_up, dizziness_syncope, dyspnea, dyspepsia_reflux, ear_hearing_symptoms, edema, epistaxis, eye_symptoms, fatigue, fever, focal_weakness_numbness, gait_falls_concern, headache, hypertension_follow_up, joint_limb_complaint, kidney_function_ckd_follow_up, liver_function_chronic_follow_up, lump_lymph_node, medication_review, memory_cognitive_concern, menstrual_uterine_bleeding, mental_health_sleep, neck_pain, oral_dental_symptoms, palpitations, pediatric_growth_development, pregnancy_postpartum_concern, reproductive_genital_symptoms, seizure_event_follow_up, skin_complaint, thyroid_concern_follow_up, tremor_movement_concern, upper_respiratory_symptoms, urinary_symptoms, vomiting_diarrhea, weight_constitutional_change, wound_minor_injury]
    RuleType:
      name: ruleType
      in: path
      required: true
      description: Partition declared by the RFE rules index; do not guess an undeclared partition
      schema:
        type: string
        enum: [completion, priority]
  schemas:
    JsonDocument:
      type: object
      additionalProperties: true
